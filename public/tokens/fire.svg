<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="fireGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#e85a30;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b45;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Orange circular background -->
  <circle cx="50" cy="50" r="50" fill="url(#bgGradient)"/>
  <!-- Flame shape - white/cream colored -->
  <path d="M50 18
           C50 18 62 32 62 45
           C62 48 60 52 58 54
