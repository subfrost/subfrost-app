           C54 52 50 58 50 58
           C50 58 46 52 46 42
           C42 44 40 50 42 54
           C40 52 38 48 38 45
           C38 32 50 18 50 18Z"
        fill="#fff3e6"
        stroke="none"/>
  <!-- Inner flame detail -->
  <path d="M50 28
           C50 28 56 38 56 46
           C56 50 54 54 50 56
           C46 54 44 50 44 46
           C44 38 50 28 50 28Z"
        fill="url(#fireGradient)"
