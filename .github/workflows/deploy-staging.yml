name: Deploy Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: subfrost-app-staging
  REPOSITORY: docker-images
  CUSTOM_DOMAIN: staging-app.subfrost.io
  BASE_DOMAIN: subfrost.io

jobs:
  deploy:
    name: Deploy to Cloud Run (Staging)
    runs-on: ubuntu-latest
    environment: Preview

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}"

          docker build \
            --tag "${IMAGE}:${{ github.sha }}" \
            --tag "${IMAGE}:latest" \
            --build-arg NEXT_PUBLIC_NETWORK=mainnet \
            --build-arg NEXT_PUBLIC_DEVNET_AUTOSTART=1 \
            --cache-from "${IMAGE}:latest" \
            .

      - name: Push Docker image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}"
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"

          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "${IMAGE}" \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --port 3000 \
            --cpu 1 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 5 \
            --concurrency 80 \
            --timeout 60 \
            --set-env-vars "NODE_ENV=production" \
            --set-env-vars "NEXT_PUBLIC_NETWORK=mainnet" \
            --set-env-vars "NEXT_PUBLIC_DEVNET_AUTOSTART=1" \
            --set-env-vars "STAGING=true" \
            --set-env-vars "REDIS_HOST=${{ secrets.REDIS_HOST }}" \
            --set-env-vars "REDIS_PORT=${{ secrets.REDIS_PORT }}" \
            --set-env-vars "ADMIN_SECRET=${{ secrets.ADMIN_SECRET }}" \
            --set-env-vars "SUBFROST_V6_API_KEY=${{ secrets.SUBFROST_V6_API_KEY }}" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest" \
            --vpc-connector "subfrost-connector" \
            --vpc-egress "private-ranges-only"

      - name: Get Service URL
        id: service
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=${URL}" >> $GITHUB_OUTPUT
          HOSTNAME=$(echo $URL | sed 's|https://||')
          echo "hostname=${HOSTNAME}" >> $GITHUB_OUTPUT

      # Domain mapping is already configured - skip creation step

      - name: Update Cloudflare DNS
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail

          DOMAIN="${{ env.CUSTOM_DOMAIN }}"
          BASE_DOMAIN="${{ env.BASE_DOMAIN }}"
          TARGET="216.239.32.21"

          # ── helper: pretty-print CF API errors ───────────────────────────────
          cf_check() {
            local LABEL="$1"
            local BODY="$2"
            local SUCCESS
            SUCCESS=$(echo "$BODY" | jq -r '.success')
            if [ "$SUCCESS" != "true" ]; then
              echo "::error::Cloudflare API call failed: ${LABEL}"
              echo "  errors  : $(echo "$BODY" | jq -c '.errors')"
              echo "  messages: $(echo "$BODY" | jq -c '.messages')"
              return 1
            fi
          }

          # ── 1. Validate token is present ─────────────────────────────────────
          if [ -z "${CF_API_TOKEN:-}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is empty or not set in the 'Preview' environment."
            echo "  Fix: GitHub → Settings → Environments → Preview → Secrets → add CLOUDFLARE_API_TOKEN"
            exit 1
          fi

          # ── 2. Verify token (shows account/zone scope + permissions) ─────────
          echo "--- Verifying Cloudflare API token ---"
          TOKEN_VERIFY=$(curl -s -X GET "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json")
          TOKEN_STATUS=$(echo "$TOKEN_VERIFY" | jq -r '.result.status // "unknown"')
          echo "  token status : ${TOKEN_STATUS}"
          echo "  token id     : $(echo "$TOKEN_VERIFY" | jq -r '.result.id // "n/a"')"
          if [ "$TOKEN_STATUS" != "active" ]; then
            echo "::error::Cloudflare API token is not active (status='${TOKEN_STATUS}'). Regenerate it at https://dash.cloudflare.com/profile/api-tokens"
            echo "  full verify response: ${TOKEN_VERIFY}"
            exit 1
          fi

          # ── 3. Look up zone ───────────────────────────────────────────────────
          echo "--- Looking up zone for ${BASE_DOMAIN} ---"
          ZONE_RESPONSE=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=${BASE_DOMAIN}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json")
          cf_check "zones lookup" "$ZONE_RESPONSE"

          ZONE_COUNT=$(echo "$ZONE_RESPONSE" | jq '.result | length')
          echo "  zones returned: ${ZONE_COUNT}"

          CF_ZONE_ID=$(echo "$ZONE_RESPONSE" | jq -r '.result[0].id // empty')
          if [ -z "$CF_ZONE_ID" ]; then
            echo "::error::No Cloudflare zone found for '${BASE_DOMAIN}'."
            echo "  Possible causes:"
            echo "    1. Token lacks 'Zone:Read' permission — add it at https://dash.cloudflare.com/profile/api-tokens"
            echo "    2. Token is scoped to a different account that doesn't own ${BASE_DOMAIN}"
            echo "    3. The domain is not yet active in Cloudflare"
            echo "  raw zones response: ${ZONE_RESPONSE}"
            exit 1
          fi
          echo "  zone id: ${CF_ZONE_ID}"

          # ── 4. Upsert A record ────────────────────────────────────────────────
          echo "--- Fetching existing DNS records for ${DOMAIN} ---"
          RESPONSE=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?name=${DOMAIN}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json")
          cf_check "list DNS records" "$RESPONSE"
          echo "  records found: $(echo "$RESPONSE" | jq '.result | length')"

          RECORD_ID=$(echo "$RESPONSE" | jq -r '.result[] | select(.type == "A" or .type == "AAAA" or .type == "CNAME") | .id' | head -1)
          RECORD_TYPE=$(echo "$RESPONSE" | jq -r '.result[] | select(.type == "A" or .type == "AAAA" or .type == "CNAME") | .type' | head -1)

          if [ -n "$RECORD_ID" ]; then
            echo "  existing ${RECORD_TYPE} record: ${RECORD_ID}"
            if [ "$RECORD_TYPE" = "A" ]; then
              PUT_RESP=$(curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${RECORD_ID}" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "{\"type\":\"A\",\"name\":\"staging-app\",\"content\":\"${TARGET}\",\"ttl\":1,\"proxied\":false}")
              cf_check "update A record" "$PUT_RESP"
              echo "  updated A record: ${DOMAIN} -> ${TARGET}"
            else
              DEL_RESP=$(curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${RECORD_ID}" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json")
              cf_check "delete ${RECORD_TYPE} record" "$DEL_RESP"
              POST_RESP=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "{\"type\":\"A\",\"name\":\"staging-app\",\"content\":\"${TARGET}\",\"ttl\":1,\"proxied\":false}")
              cf_check "create replacement A record" "$POST_RESP"
              echo "  replaced ${RECORD_TYPE} with A record: ${DOMAIN} -> ${TARGET}"
            fi
          else
            echo "  no existing record — creating A record"
            POST_RESP=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"staging-app\",\"content\":\"${TARGET}\",\"ttl\":1,\"proxied\":false}")
            cf_check "create A record" "$POST_RESP"
            echo "  created A record: ${DOMAIN} -> ${TARGET}"
          fi

          # ── 5. Upsert AAAA records ────────────────────────────────────────────
          echo "--- Upserting AAAA records ---"
          AAAA_TARGETS=("2001:4860:4802:32::15" "2001:4860:4802:34::15" "2001:4860:4802:36::15" "2001:4860:4802:38::15")

          for AAAA_TARGET in "${AAAA_TARGETS[@]}"; do
            AAAA_RESPONSE=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?name=${DOMAIN}&type=AAAA&content=${AAAA_TARGET}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json")
            cf_check "list AAAA record ${AAAA_TARGET}" "$AAAA_RESPONSE"

            AAAA_RECORD_ID=$(echo "$AAAA_RESPONSE" | jq -r '.result[0].id // empty')
            if [ -n "$AAAA_RECORD_ID" ]; then
              echo "  AAAA already exists: ${DOMAIN} -> ${AAAA_TARGET}"
            else
              AAAA_POST=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "{\"type\":\"AAAA\",\"name\":\"staging-app\",\"content\":\"${AAAA_TARGET}\",\"ttl\":1,\"proxied\":false}")
              cf_check "create AAAA record ${AAAA_TARGET}" "$AAAA_POST"
              echo "  created AAAA record: ${DOMAIN} -> ${AAAA_TARGET}"
            fi
          done

          echo "--- DNS update complete ---"

      - name: Deployment Summary
        run: |
          echo "### Staging Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Staging URL:** https://${{ env.CUSTOM_DOMAIN }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Cloud Run URL:** ${{ steps.service.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
